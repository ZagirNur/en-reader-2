  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 .theme-toggle button.on { background: var(--ink); color: var(--bg); }\n\n  /* phone */\n  .phone {\n    width: 390px; height: 800px;\n    border-radius: 48px;\n    background: var(--bg);\n    color: var(--ink);\n    border: 8px solid #000;\n    box-shadow: 0 28px 56px -20px rgba(0,0,0,0.35), 0 10px 24px rgba(0,0,0,0.15);\n    overflow: hidden; position: relative;\n    display: flex; flex-direction: column;\n    transition: background 0.3s, color 0.3s;\n  }\n  .notch {\n    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);\n    width: 120px; height: 28px; background: #000; border-radius: 18px; z-index: 60;\n  }\n  .statusbar {\n    height: 46px; padding: 14px 28px 0;\n    display: flex; justify-content: space-between; align-items: flex-start;\n    font-size: 14px; font-weight: 600; flex-shrink: 0; color: var(--ink);\n  }\n  .homebar {\n    position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);\n    width: 130px; height: 4px; border-radius: 2px;\n    background: var(--ink); opacity: 0.45; z-index: 55;\n  }\n  .body { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }\n  .scroll { flex: 1; overflow-y: auto; overscroll-behavior: contain; }\n  .scroll::-webkit-scrollbar { width: 0; }\n\n  /* tab bar */\n  .tabbar {\n    display: flex; padding: 8px 10px 30px;\n    background: color-mix(in oklab, var(--bg) 88%, transparent);\n    backdrop-filter: blur(14px);\n    border-top: 1px solid var(--line);\n    flex-shrink: 0;\n  }\n  .tab {\n    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;\n    padding: 8px 0; cursor: pointer; position: relative;\n    font-size: 10px; font-weight: 500; color: var(--ink-3);\n    background: none; border: none;\n    font-family: inherit;\n    transition: color 0.15s;\n  }\n  .tab.on { color: var(--ink); }\n  .tab.on .tab-dot {\n    position: absolute; bottom: -8px; width: 4px; height: 4px;\n    border-radius: 50%; background: var(--accent);\n  }\n  .tab svg { width: 22px; height: 22px; }\n\n  /* buttons + chips */\n  .btn {\n    display: inline-flex; align-items: center; justify-content: center; gap: 8px;\n    padding: 14px 20px; border-radius: 12px;\n    font-family: inherit; font-size: 15px; font-weight: 600;\n    border: none; cursor: pointer; transition: transform 0.08s, background 0.15s;\n  }\n  .btn:active { transform: scale(0.97); }\n  .btn.primary { background: var(--ink); color: var(--bg); }\n  .btn.accent { background: var(--accent); color: #fff; }\n  .btn.ghost { background: var(--bg-2); color: var(--ink); }\n  .btn.full { width: 100%; }\n  .btn.sm { padding: 10px 14px; font-size: 13px; border-radius: 10px; }\n\n  .chip {\n    display: inline-flex; align-items: center; gap: 6px;\n    padding: 6px 12px; border-radius: 8px;\n    font-size: 12px; font-weight: 500;\n    background: var(--bg-2); color: var(--ink-2);\n    border: 1px solid transparent; cursor: pointer;\n    font-family: inherit;\n  }\n  .chip.on { background: var(--ink); color: var(--bg); }\n  .chip .n { opacity: 0.5; font-weight: 400; margin-left: 2px; }\n\n  /* covers */\n  .cover {\n    aspect-ratio: 2/3; border-radius: 6px; overflow: hidden;\n    position: relative; display: flex; flex-direction: column;\n    padding: 12px 10px; color: #fff;\n    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06), 0 10px 24px -14px rgba(0,0,0,0.3);\n  }\n  .cover::after {\n    content: ''; position: absolute; inset: 0;\n    background: linear-gradient(180deg, rgba(255,255,255,0.1), transparent 30%, rgba(0,0,0,0.18));\n    pointer-events: none;\n  }\n  .cover .ct {\n    font-family: 'Instrument Serif', Georgia, serif;\n    font-size: 16px; line-height: 1.05; font-weight: 400; letter-spacing: -0.01em;\n  }\n  .cover .ca {\n    margin-top: auto;\n    font-size: 8px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.78;\n    font-weight: 500;\n  }\n  .cover.c-olive   { background: linear-gradient(150deg, #6a7a42, #3d4826); }\n  .cover.c-cla   c.innerHTML = `${f.lbl} <span class=\"n\">${f.n}<\u002Fspan>`;\n      fRow.append(c);\n    });\n    root.append(fRow);\n\n    // list\n    const filtered = S.dictFilter === 'all' ? S.saved : S.saved.filter(d => d.lvl === S.dictFilter);\n    const list = h('div', { style: { padding: '0 22px 24px', display: 'flex', flexDirection: 'column', gap: '10px' } });\n\n    if (filtered.length === 0) {\n      list.append(h('div', { style: { padding: '40px 20px', textAlign: 'center', color: 'var(--ink-2)', fontSize: '13px' } }, 'Здесь пока пусто'));\n    } else {\n      filtered.forEach(d => {\n        const b = badgeFor(d.lvl);\n        const card = h('div', { class: 'card', style: { padding: '14px', cursor: 'pointer' }, onclick: () => openSavedWord(d) });\n        card.innerHTML = `\n          <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:10px\">\n            <div style=\"flex:1;min-width:0\">\n              <div style=\"display:flex;gap:8px;align-items:baseline;flex-wrap:wrap\">\n                <div style=\"font-size:19px;font-weight:600;letter-spacing:-0.01em\">${d.w}<\u002Fdiv>\n                <div style=\"font-size:13px;color:var(--ink-2)\">— ${d.ru}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"margin-top:6px;font-size:12px;color:var(--ink-2);line-height:1.4\">\"${d.ex}\"<\u002Fdiv>\n              <div style=\"margin-top:8px;font-size:10px;color:var(--ink-2);letter-spacing:0.02em\">\n                ${d.src}${d.d > 0 ? ' · ' + d.d + ' дн.' : ''}\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"padding:4px 8px;border-radius:6px;font-size:10px;font-weight:600;background:${b.bg};color:${b.col};white-space:nowrap\">${b.t}<\u002Fspan>\n          <\u002Fdiv>\n        `;\n        list.append(card);\n      });\n    }\n    root.append(list);\n    return root;\n  }\n\n  function badgeFor(lvl) {\n    if (lvl === 'new') return { bg: 'var(--accent)', col: '#fff', t: 'новое' };\n    if (lvl === 'learning') return { bg: 'var(--soft)', col: 'var(--ink)', t: 'учу' };\n    if (lvl === 'review') return { bg: '#c9a253', col: '#2d1a12', t: 'повторить' };\n    return { bg: S.dark ? '#2a3f24' : '#d8e0c0', col: S.dark ? '#c5d5a0' : '#2a3f14', t: 'выучено' };\n  }\n\n  function openSavedWord(d) {\n    const sheet = h('div', {});\n    const head = h('div', { style: { display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: '12px' } });\n    head.append(h('div', {},\n      h('div', { style: { fontSize: '34px', fontWeight: 600, lineHeight: 1, letterSpacing: '-0.02em' } }, d.w),\n      h('div', { style: { marginTop: '6px', fontSize: '13px', color: 'var(--ink-2)', fontStyle: 'italic' } }, `${d.ipa} · ${d.pos}`)\n    ));\n    const closeBtn = h('button', {\n      style: { width: '36px', height: '36px', borderRadius: '12px', border: '1px solid var(--line)', background: 'transparent', color: 'var(--ink)', cursor: 'pointer' },\n      onclick: closeSheet, html: I.x.replace('<svg', '<svg width=\"16\" height=\"16\"')\n    });\n    head.append(closeBtn);\n    sheet.append(head);\n\n    sheet.append(h('div', { style: { marginTop: '16px', padding: '14px', borderRadius: '14px', background: 'var(--soft)' } },\n      h('div', { class: 'uplabel', style: { marginBottom: '6px' } }, 'Перевод'),\n      h('div', { style: { fontSize: '18px', fontWeight: 500 } }, d.ru)\n    ));\n\n    sheet.append(h('div', { style: { marginTop: '16px' } },\n      h('div', { class: 'uplabel', style: { marginBottom: '8px' } }, `Из книги · ${d.src}`),\n      h('div', { style: { fontSize: '13px', lineHeight: 1.5 }, html: `\"${d.ex.replace(d.w, `<b style='color:var(--accent)'>${d.w}<\u002Fb>`)}\"` })\n    ));\n\n    const row = h('div', { style: { marginTop: '22px', display: 'flex', gap: '10px' } });\n    const train = h('button', { class: 'btn primary', style: { flex: 1 }, onclick: () => { closeSheet(); S.tab = 'learn'; S.screen = 'learnCard'; S.learn = { idx: 0, correct: 0, done: false, feedback: null }; render(); } });\n    train.innerHTML = `${I.brain.replace('<svg', '<svg width=\"16\" height=\"16\"')} Тренировать`;\n    const del = h('button', { class: 'btn ghost', style: { flex: 1 }, onclick: () => { S.saved = S.saved.filter(s => s.w !== d.w); closeSheet(); render(); showToast('Удалено'); } });\n    del.innerHTML = `${I.x.replace('<svg', '<svg width=\"16\" height=\"16\"')} Удалить`;\n    row.append(train, del);\n    sheet.append(row);\n\n    openSheet(sheet);\n  }\n\n  // LEARN HOME\n  function ScreenLearn() {\n    const root = h('div', { class: 'scroll screen-in', style: { padding: '18px 22px 24px' } });\n    root.append(h('div', { class: 'uplabel', style: { marginBottom: '2px' } }, 'Тренировка'));\n    root.append(h('h1', { style: { margin: 0, fontSize: '30px', letterSpacing: '-0.02em', fontWeight: 600 } }, 'Что учим сегодня'));\n\n    // daily goal\n    const ready = S.saved.filter(d => d.lvl !== 'mastered').length;\n    const goal = h('div', { class: 'card', style: { marginTop: '18px', padding: '18px', background: 'var(--soft)', border: 'none' } });\n    goal.innerHTML = `\n      <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:10px\">\n        <div style=\"width:32px;height:32px;border-radius:10px;background:var(--accent);color:#fff;display:inline-flex;align-items:center;justify-content:center\">${I.fire.replace('<svg', '<svg width=\"18\" height=\"18\"')}<\u002Fdiv>\n        <div>\n          <div style=\"font-size:14px;font-weight:600\">Цель дня: 10 слов<\u002Fdiv>\n          <div style=\"font-size:11px;color:var(--ink-2)\">8 / 10 сделано<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pbar\"><i style=\"width:80%\"><\u002Fi><\u002Fdiv>\n    `;\n    root.append(goal);\n\n    // mode cards\n    const modes = [\n      { id: 'mc', title: 'Выбор перевода', desc: '4 варианта · быстро и бодро', n: ready, emoji: '⚡' },\n      { id: 'fl', title: 'Карточки',       desc: 'Интервальные повторения',     n: ready, emoji: '🧠' },\n    ];\n    root.append(h('div', { class: 'uplabel', style: { marginTop: '22px', marginBottom: '10px' } }, 'Режимы'));\n\n    modes.forEach((m, i) => {\n      const card = h('div', { class: 'card', style: { padding: '16px', marginBottom: '10px', cursor: 'pointer', display: 'flex', gap: '14px', alignItems: 'center' } , onclick: () => { S.screen = 'learnCard'; S.learn = { idx: 0, correct: 0, done: false, feedback: null }; render(); } });\n      card.innerHTML = `\n        <div style=\"width:44px;height:44px;border-radius:12px;background:var(--soft);display:inline-flex;align-items:center;justify-content:center;font-size:22px\">${m.emoji}<\u002Fdiv>\n        <div style=\"flex:1\">\n          <div style=\"font-size:15px;font-weight:600\">${m.title}<\u002Fdiv>\n          <div style=\"font-size:12px;color:var(--ink-2);margin-top:2px\">${m.desc}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:12px;color:var(--ink-2);display:inline-flex;align-items:center;gap:6px\">\n          ${m.n} слов ${I.chevR.replace('<svg', '<svg width=\"14\" height=\"14\"')}\n        <\u002Fdiv>\n      `;\n      root.append(card);\n    });\n\n    return root;\n  }\n\n  // LEARN CARD (multiple choice)\n  function ScreenLearnCard() {\n    const root = h('div', { class: 'scroll screen-in', style: { padding: '14px 22px 24px' } });\n\n    const pool = S.saved.filter(d => d.lvl !== 'mastered');\n    const total = Math.min(pool.length, 10);\n\n    if (S.learn.done || S.learn.idx >= total || total === 0) {\n      // done screen\n      root.append(h('div', { style: { textAlign: 'center', padding: '40px 20px' } },\n        h('div', { style: { fontSize: '56px', marginBottom: '14px' } }, '✨'),\n        h('h1', { style: { margin: 0, fontSize: '28px', fontWeight: 600 } }, 'Готово!'),\n        h('div', { style: { marginTop: '10px', fontSize: '14px', color: 'var(--ink-2)' } }, `${S.learn.correct} из ${total} верно`),\n        h('div', { class: 'card', style: { marginTop: '26px', padding: '16px', textAlign: 'left', background: 'var(--soft)', border: 'none' }, html: `\n          <div style=\"font-size:12px;color:var(--ink-2);margin-bottom:4px\">Серия<\u002Fdiv>\n          <div style=\"font-size:20px;font-weight:600\">7 дней подряд 🔥<\u002Fdiv>\n          <div style=\"font-size:11px;color:var(--ink-2);margin-top:4px\">+${S.learn.correct * 10} XP<\u002Fdiv>\n        `}),\n      ));\n      const done = h('button', { class: 'btn primary full', style: { marginTop: '20px' }, onclick: () => { S.screen = 'learn'; render(); } }, 'Вернуться');\n      root.append(done);\n      return root;\n    }\n\n    const cur = pool[S.learn.idx];\n    // generate 3 distractors\n    const distractors = S.saved.filter(d => d.w !== cur.w).map(d => d.ru);\n    const fallback = ['внушительный','странный','тёплый','острый','лёгкий','прилежный','хрупкий'];\n    const picks = [cur.ru, ...[...distractors, ...fallback].slice(0, 3)];\n    // deterministic shuffle (based on idx)\n    const ordered = picks.slice().sort((a, b) => (a.length - b.length) + (S.learn.idx - S.learn.idx * 0.5));\n\n    // header + progress\n    root.append(h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '6px' } },\n      h('button', { class: 'btn ghost sm', style: { padding: '6px 10px' }, onclick: () => { S.screen = 'learn'; render(); }, html: I.chevL.replace('<svg', '<svg width=\"18\" height=\"18\"') }),\n      h('div', { style: { fontSize: '12px', color: 'var(--ink-2)' } }, `${S.learn.idx + 1} / ${total}`),\n      h('div', { style: { width: '34px' } })\n    ));\n    const prog = h('div', { style: { display: 'flex', gap: '4px', marginBottom: '20px' } });\n    for (let i = 0; i < total; i++) {\n      prog.append(h('div', { style: { flex: 1, height: '3px', borderRadius: '2px', background: i < S.learn.idx ? 'var(--accent)' : i === S.learn.idx ? 'var(--ink)' : 'var(--line)' } }));\n    }\n    root.append(prog);\n\n    // flashcard\n    const card = h('div', { class: 'card', style: { padding: '30px 20px 24px', borderRadius: '20px', minHeight: '260px' } });\n    card.append(h('div', { class: 'uplabel', style: { textAlign: 'center' } }, 'Какой перевод?'));\n    card.append(h('div', { style: { marginTop: '16px', textAlign: 'center', fontSize: '42px', lineHeight: 1, letterSpacing: '-0.02em', fontWeight: 600 } }, cur.w));\n    card.append(h('div', { style: { marginTop: '10px', textAlign: 'center', fontSize: '12px', color: 'var(--ink-2)', fontStyle: 'italic' } }, `${cur.ipa} · ${cur.pos}`));\n    card.append(h('div', { style: { marginTop: '22px', padding: '14px 16px', borderRadius: '12px', background: 'var(--soft)', fontSize: '14px', lineHeight: 1.55, textAlign: 'center' } , html:\n      `\"${cur.ex.replace(cur.w, `<b style='color:var(--accent)'>${cur.w}<\u002Fb>`)}\"` }));\n    card.append(h('div', { style: { marginTop: '8px', textAlign: 'center', fontSize: '10px', color: 'var(--ink-2)', letterSpacing: '0.04em' } }, cur.src));\n    root.append(card);\n\n    // answers\n    const grid = h('div', { style: { marginTop: '18px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' } });\n    ordered.forEach((opt) => {\n      const right = opt === cur.ru;\n      let style = 'background:var(--card);color:var(--ink);border:1.5px solid var(--line);';\n      if (S.learn.feedback) {\n        if (right) style = 'background:color-mix(in oklab, #6b8a4a 25%, var(--card));color:var(--ink);border:1.5px solid #6b8a4a;';\n        else if (S.learn.feedback === 'wrong' && opt === S.learn.pickedWrong) style = 'background:color-mix(in oklab, var(--accent) 18%, var(--card));color:var(--ink);border:1.5px solid var(--accent);';\n      }\n      const btn = h('button', {\n        style: { ...styleFromStr(style), padding: '16px 14px', borderRadius: '14px', fontSize: '15px', fontWeight: 500, fontFamily: 'inherit', textAlign: 'left', cursor: S.learn.feedback ? 'default' : 'pointer', transition: 'background 0.2s, border 0.2s' },\n        onclick: () => {\n          if (S.learn.feedback) return;\n          if (right) {\n            S.learn.feedback = 'ok';\n            S.learn.correct += 1;\n            renderLearnOnly();\n            setTimeout(() => { S.learn.idx += 1; S.learn.feedback = null; S.learn.pickedWrong = null; if (S.learn.idx >= total) S.learn.done = true; render(); }, 700);\n          } else {\n            S.learn.feedback = 'wrong';\n            S.learn.pickedWrong = opt;\n            renderLearnOnly();\n            setTimeout(() => { S.learn.idx += 1; S.learn.feedback = null; S.learn.pickedWrong = null; if (S.learn.idx >= total) S.learn.done = true; render(); }, 1200);\n          }\n        }\n      }, opt);\n      grid.append(btn);\n    });\n    root.append(grid);\n\n    // footer actions\n    root.append(h('div', { style: { marginTop: '18px', display: 'flex', justifyContent: 'space-between', fontSize: '12px', color: 'var(--ink-2)' } },\n      h('span', { style: { cursor: 'pointer' }, onclick: () => { S.learn.idx += 1; if (S.learn.idx >= total) S.learn.done = true; render(); } }, 'Пропустить'),\n      h('span', {}, S.learn.feedback === 'ok' ? '✓ верно' : S.learn.feedback === 'wrong' ? 'правильный вариант подсвечен' : 'нажми любой вариант')\n    ));\n\n    return root;\n  }\n\n  function styleFromStr(str) {\n    const obj = {};\n    str.split(';').forEach(s => { const [k,v] = s.split(':'); if (k && v) obj[k.trim().replace(/-([a-z])/g, (_,c)=>c.toUpperCase())] = v.trim(); });\n    return obj;\n  }\n\n  // ─────────── Render ───────────\n  function render() {\n    const root = $('root');\n    root.innerHTML = '';\n    closeSheet();\n\n    let screen;\n    switch (S.screen) {\n      case 'reader':    screen = ScreenReader(); break;\n      case 'cat':       screen = ScreenCatalog(); break;\n      case 'dict':      screen = ScreenDictionary(); break;\n      case 'learn':     screen = ScreenLearn(); break;\n      case 'learnCard': screen = ScreenLearnCard(); break;\n      case 'lib':\n      default:          screen = ScreenLibrary(); break;\n    }\n    root.append(screen);\n\n    // tab bar visibility — hide in reader\n    const slot = $('tabbarSlot');\n    slot.innerHTML = '';\n    if (S.screen !== 'reader') slot.append(TabBar());\n  }\n\n  // in-place re-render helpers that don't blow the whole screen away\n  function renderReaderOnly() {\n    if (S.screen !== 'reader') return;\n    const root = $('root');\n    root.innerHTML = '';\n    root.append(ScreenReader());\n  }\n  function renderLearnOnly() {\n    if (S.screen !== 'learnCard') return;\n    const root = $('root');\n    root.innerHTML = '';\n    root.append(ScreenLearnCard());\n  }\n\n  // ─────────── Theme toggle ───────────\n  function applyTheme() {\n    document.body.classList.toggle('dark', S.dark);\n    document.getElementById('phone').classList.toggle('dark', S.dark);\n    const t = $('themeToggle');\n    t.querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.mode === (S.dark ? 'dark' : 'light')));\n  }\n  $('themeToggle').addEventListener('click', (e) => {\n    const b = e.target.closest('button'); if (!b) return;\n    S.dark = b.dataset.mode === 'dark';\n    applyTheme();\n  });\n\n  applyTheme();\n  render();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
