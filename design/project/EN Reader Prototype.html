<style>
  :root {
    --bg: #f6f4ef; --bg-2: #ecebe5; --card: #ffffff;
    --ink: #14141a; --ink-2: #5c5c66; --ink-3: #9a9aa5;
    --line: #e1dfd5; --accent: #e85d2c; --accent-2: #ff7a45;
    --soft: #ecebe5;
  }
  .dark {
    --bg: #0e0e10; --bg-2: #17171a; --card: #17171a;
    --ink: #ebebef; --ink-2: #9a9aa5; --ink-3: #5c5c66;
    --line: #27272e; --accent: #ff7a45; --accent-2: #ffa88a;
    --soft: #1f1f24;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Geist', system-ui, -apple-system, sans-serif;
    background: #d8d3c7;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 32px 16px;
    transition: background 0.3s;
  }
  body.dark { background: #1a1a1e; }

  /* frame */
  .stage { display: flex; flex-direction: column; align-items: center; gap: 20px; }

  .theme-toggle {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    display: flex; background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: 4px; gap: 2px;
    box-shadow: 0 8px 24px -10px rgba(0,0,0,0.15);
  }
  .theme-toggle button {
    border: none; background: none; padding: 8px 14px; border-radius: 999px;
    font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer;
    color: var(--ink-2);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .theme-toggle button.on { background: var(--ink); color: var(--bg); }

  /* phone */
  .phone {
    width: 390px; height: 800px;
    border-radius: 48px;
    background: var(--bg);
    color: var(--ink);
    border: 8px solid #000;
    box-shadow: 0 28px 56px -20px rgba(0,0,0,0.35), 0 10px 24px rgba(0,0,0,0.15);
    overflow: hidden; position: relative;
    display: flex; flex-direction: column;
    transition: background 0.3s, color 0.3s;
  }
  .notch {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 28px; background: #000; border-radius: 18px; z-index: 60;
  }
  .statusbar {
    height: 46px; padding: 14px 28px 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    font-size: 14px; font-weight: 600; flex-shrink: 0; color: var(--ink);
  }
  .homebar {
    position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
    width: 130px; height: 4px; border-radius: 2px;
    background: var(--ink); opacity: 0.45; z-index: 55;
  }
  .body { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
  .scroll { flex: 1; overflow-y: auto; overscroll-behavior: contain; }
  .scroll::-webkit-scrollbar { width: 0; }

  /* tab bar */
  .tabbar {
    display: flex; padding: 8px 10px 30px;
    background: color-mix(in oklab, var(--bg) 88%, transparent);
    backdrop-filter: blur(14px);
    border-top: 1px solid var(--line);
    flex-shrink: 0;
  }
  .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 8px 0; cursor: pointer; position: relative;
    font-size: 10px; font-weight: 500; color: var(--ink-3);
    background: none; border: none;
    font-family: inherit;
    transition: color 0.15s;
  }
  .tab.on { color: var(--ink); }
  .tab.on .tab-dot {
    position: absolute; bottom: -8px; width: 4px; height: 4px;
    border-radius: 50%; background: var(--accent);
  }
  .tab svg { width: 22px; height: 22px; }

  /* buttons + chips */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 20px; border-radius: 12px;
    font-family: inherit; font-size: 15px; font-weight: 600;
    border: none; cursor: pointer; transition: transform 0.08s, background 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: var(--ink); color: var(--bg); }
  .btn.accent { background: var(--accent); color: #fff; }
  .btn.ghost { background: var(--bg-2); color: var(--ink); }
  .btn.full { width: 100%; }
  .btn.sm { padding: 10px 14px; font-size: 13px; border-radius: 10px; }

  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 8px;
    font-size: 12px; font-weight: 500;
    background: var(--bg-2); color: var(--ink-2);
    border: 1px solid transparent; cursor: pointer;
    font-family: inherit;
  }
  .chip.on { background: var(--ink); color: var(--bg); }
  .chip .n { opacity: 0.5; font-weight: 400; margin-left: 2px; }

  /* covers */
  .cover {
    aspect-ratio: 2/3; border-radius: 6px; overflow: hidden;
    position: relative; display: flex; flex-direction: column;
    padding: 12px 10px; color: #fff;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06), 0 10px 24px -14px rgba(0,0,0,0.3);
  }
  .cover::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.1), transparent 30%, rgba(0,0,0,0.18));
    pointer-events: none;
  }
  .cover .ct {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: 16px; line-height: 1.05; font-weight: 400; letter-spacing: -0.01em;
  }
  .cover .ca {
    margin-top: auto;
    font-size: 8px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.78;
    font-weight: 500;
  }
  .cover.c-olive   { background: linear-gradient(150deg, #6a7a42, #3d4826); }
  .cover.c-clay    { background: linear-gradient(150deg, #c85a38, #7a2a18); }
  .cover.c-ink     { background: linear-gradient(150deg, #2a3342, #0f141c); }
  .cover.c-mauve   { background: linear-gradient(150deg, #8c5a6b, #4a2a35); }
  .cover.c-mustard { background: linear-gradient(150deg, #c9a253, #7a5a1c); color: #14141a; }
  .cover.c-mustard .ca { color: #14141a; }
  .cover.c-sage    { background: linear-gradient(150deg, #8a9a6c, #4a5836); }
  .cover.c-rose    { background: linear-gradient(150deg, #c8685a, #6f2e24); }
  .dark .cover.c-olive   { background: linear-gradient(150deg, #3a4424, #1d2212); }
  .dark .cover.c-clay    { background: linear-gradient(150deg, #b85a38, #5a2612); }
  .dark .cover.c-ink     { background: linear-gradient(150deg, #303a4c, #0a0d14); }
  .dark .cover.c-mauve   { background: linear-gradient(150deg, #6f4658, #3a2530); }
  .dark .cover.c-mustard { background: linear-gradient(150deg, #c9a253, #5a4418); }
  .dark .cover.c-sage    { background: linear-gradient(150deg, #6b7d5a, #3a4632); }
  .dark .cover.c-rose    { background: linear-gradient(150deg, #a85c4c, #5a2a20); }

  /* translated word pill */
  .word {
    cursor: pointer;
    padding: 0 2px; border-radius: 3px;
    transition: background 0.15s;
  }
  .word.translated {
    background: color-mix(in oklab, var(--accent) 15%, transparent);
    color: var(--accent);
    border-bottom: 1px solid var(--accent);
    font-weight: 500;
  }
  .word.highlighted {
    background: color-mix(in oklab, var(--accent) 25%, transparent);
    color: var(--accent);
    font-weight: 600;
  }

  /* display font in this theme = Geist (editorial). Instrument Serif used sparingly for big numbers / covers */
  h1, h2, h3 { font-family: 'Geist', sans-serif; }
  .serif { font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; }

  .uplabel {
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-2); font-weight: 500;
  }

  /* sheet / popup */
  .scrim {
    position: absolute; inset: 0; z-index: 90;
    background: rgba(0,0,0,0.32);
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .scrim.show { opacity: 1; pointer-events: auto; }
  .sheet {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 100;
    background: var(--card);
    border-top-left-radius: 28px; border-top-right-radius: 28px;
    padding: 16px 22px 28px;
    transform: translateY(100%); transition: transform 0.28s cubic-bezier(.2,.9,.3,1);
    box-shadow: 0 -20px 40px -14px rgba(0,0,0,0.35);
  }
  .sheet.show { transform: translateY(0); }
  .sheet .handle {
    width: 40px; height: 4px; border-radius: 2px; background: var(--line);
    margin: 0 auto 16px;
  }

  /* card */
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; }

  /* progress bar */
  .pbar { height: 4px; border-radius: 2px; background: var(--line); overflow: hidden; }
  .pbar > i { display: block; height: 100%; background: var(--accent); }

  /* toast */
  .toast {
    position: absolute; top: 60px; left: 50%; transform: translate(-50%, -20px);
    background: var(--ink); color: var(--bg);
    padding: 10px 16px; border-radius: 999px;
    font-size: 13px; font-weight: 500;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 150;
    box-shadow: 0 10px 24px -8px rgba(0,0,0,0.3);
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }

  /* fade-in for screens */
  @keyframes screen-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: none; }
  }
  .screen-in { animation: screen-in 0.18s ease-out; }

  @media (max-width: 480px) {
    body { padding: 0; align-items: stretch; background: var(--bg); }
    body.dark { background: var(--bg); }
    .phone { width: 100%; height: 100vh; border-radius: 0; border: none; box-shadow: none; }
    .notch { display: none; }
    .homebar { display: none; }
    .statusbar { display: none; }
    .theme-toggle { top: 10px; right: 10px; }
  }
</style>
</head>
<body>
  <div class="theme-toggle" id="themeToggle">

  <div class="stage">

          <svg width="24" height="11" viewBox="0 0 24 11" fill="none"><rect x="0.5" y="0.5" width="20" height="10" rx="2.5" stroke="currentColor" opacity="0.4"/><rect x="2" y="2" width="14" height="7" rx="1.2" fill="currentColor"/><rect x="21" y="3.5" width="1.5" height="4" rx="0.5" fill="currentColor" opacity="0.4"/></svg>

  <script>
  // ─────────── Data ───────────
  const LIBRARY = [

  // text is an array of paragraphs. Each paragraph is an array of tokens.
  // token: string (plain) | {w, ru} translatable word
  const GATSBY_PAGE = [
    [
      'In my younger and more ',
      { w: 'vulnerable', ru: 'уязвимые' },
      ' years my father gave me some ',
      { w: 'advice', ru: 'советы' },
      ' that I\'ve been ',

    [

      { w: 'criticizing', ru: 'критиковать' },

      { w: 'curious', ru: 'любопытных' },

  const WORD_INFO = {
    vulnerable: { ipa: '/ˈvʌln(ə)rəb(ə)l/', pos: 'прил.', ru: 'уязвимый, ранимый' },
    advice:     { ipa: '/ədˈvaɪs/',        pos: 'сущ.',  ru: 'совет' },

  // ─────────── State ───────────
  const S = {
    tab: 'lib',
    screen: 'lib',     // 'lib' | 'cat' | 'dict' | 'learn' | 'reader' | 'learnCard'
    dark: false,

  // ─────────── Icons ───────────
  const I = {

  // ─────────── Render helpers ───────────
  const $ = (id) => document.getElementById(id);
  const h = (tag, attrs = {}, ...kids) => {
    const el = document.createElement(tag);
    for (const k in attrs) {
      if (k === 'class') el.className = attrs[k];
      else if (k === 'html') el.innerHTML = attrs[k];
      else if (k.startsWith('on')) el.addEventListener(k.slice(2), attrs[k]);
      else if (k === 'style' && typeof attrs[k] === 'object') Object.assign(el.style, attrs[k]);
      else el.setAttribute(k, attrs[k]);
    }
    for (const kid of kids.flat()) {
      if (kid == null || kid === false) continue;
      el.append(kid.nodeType ? kid : document.createTextNode(kid));
    }
    return el;
  };

  function showToast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => t.classList.remove('show'), 1600);
  }

  function openSheet(content) {
    const sheet = $('sheet');
    sheet.innerHTML = '';
    sheet.append(h('div', { class: 'handle' }));
    sheet.append(content);
    requestAnimationFrame(() => {
      $('scrim').classList.add('show');
      sheet.classList.add('show');
    });
  }
  function closeSheet() {
    $('scrim').classList.remove('show');
    $('sheet').classList.remove('show');
  }
  $('scrim')?.addEventListener('click', closeSheet);

    // top chrome
    const top = h('div', { style: { padding: '4px 14px 10px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', borderBottom: '1px solid var(--line)', flexShrink: 0 } });
    const back = h('button', { class: 'btn ghost sm', style: { padding: '8px', background: 'transparent' }, onclick: () => { S.screen = 'lib'; S.tab = 'lib'; render(); } });
    back.innerHTML = I.chevL.replace('<svg', '<svg width="22" height="22"');
    const mid = h('div', { style: { textAlign: 'center' } });
    mid.innerHTML = `
      <div style="font-size:12px;font-weight:600">The Great Gatsby</div>
      <div style="font-size:10px;color:var(--ink-2);margin-top:1px">Глава 1 · стр. 7 из 182</div>

    gear.innerHTML = I.settings.replace('<svg', '<svg width="22" height="22"');
    top.append(back, mid, gear);
    wrap.append(top);

    // body
    const body = h('div', { class: 'scroll', style: { padding: '26px 26px 16px' } });
    body.append(h('div', { class: 'uplabel', style: { marginBottom: '14px' } }, 'Chapter One'));

    const article = h('div', { style: { fontSize: '17px', lineHeight: 1.65, color: 'var(--ink)', textWrap: 'pretty' } });
    GATSBY_PAGE.forEach((para, pi) => {
      const p = h('p', { style: { margin: '0 0 14px' } });
      para.forEach((tok, ti) => {
        if (typeof tok === 'string') {
          p.append(document.createTextNode(tok));
        } else {
          const isTr = S.translated.has(tok.w);
          const isHi = S.highlightWord === tok.w;
          const span = h('span', {
            class: 'word' + (isTr ? ' translated' : '') + (isHi ? ' highlighted' : ''),
            onclick: (e) => { e.stopPropagation(); onWordTap(tok); }
          }, isTr ? tok.ru : tok.w);
          p.append(span);
        }
      });
      article.append(p);
    });
    body.append(article);

    body.append(h('div', { style: { marginTop: '10px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', fontSize: '11px', color: 'var(--ink-2)' } },
      h('span', {}, '42 % · ~18 мин до конца главы'),
      h('span', { html: `${I.star.replace('<svg', '<svg width="12" height="12" style=\'vertical-align:-2px;margin-right:4px\'')} ${S.translated.size} новых слов` })
    ));

    wrap.append(body);

    const pb = h('div', { style: { padding: '10px 22px 14px', borderTop: '1px solid var(--line)', flexShrink: 0 } });
    pb.innerHTML = `<div class="pbar"><i style="width:42%"></i></div>`;
    wrap.append(pb);

    return wrap;
  }

  // Handle tapping a word in the reader:
  // - if untranslated: translate all instances + show popup with "Отменить" + "В словарь"
  // - if already translated: show popup with "↩ Оригинал" + "В словарь"
  function onWordTap(tok) {
    const wasTranslated = S.translated.has(tok.w);
    if (!wasTranslated) {
      S.translated.add(tok.w);
      S.highlightWord = tok.w;
      renderReaderOnly();
      setTimeout(() => { S.highlightWord = null; renderReaderOnly(); }, 800);
    }
    openWordPopup(tok, wasTranslated);
  }

  function openWordPopup(tok, wasAlreadyTranslated) {
    const info = WORD_INFO[tok.w] || { ipa: '—', pos: '', ru: tok.ru };
    const saved = S.saved.some(s => s.w === tok.w);

    const sheet = h('div', {});
    // headword
    const head = h('div', { style: { display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: '12px' } });
    head.append(h('div', {},
      h('div', { style: { fontSize: '34px', fontWeight: 600, lineHeight: 1, letterSpacing: '-0.02em' } }, tok.w),
      h('div', { style: { marginTop: '6px', fontSize: '13px', color: 'var(--ink-2)', fontStyle: 'italic' } }, `${info.ipa} · ${info.pos}`)
    ));
    const closeBtn = h('button', {
      style: { width: '36px', height: '36px', borderRadius: '12px', border: '1px solid var(--line)', background: 'transparent', color: 'var(--ink)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' },
      onclick: closeSheet, html: I.x.replace('<svg', '<svg width="16" height="16"')
    });
    head.append(closeBtn);
    sheet.append(head);

    // translation card
    const trCard = h('div', { style: { marginTop: '16px', padding: '14px', borderRadius: '14px', background: 'var(--soft)' } });
    trCard.append(h('div', { class: 'uplabel', style: { marginBottom: '6px' } }, 'Перевод'));
    trCard.append(h('div', { style: { fontSize: '18px', fontWeight: 500 } }, info.ru));
    sheet.append(trCard);

    // example from book
    const ex = h('div', { style: { marginTop: '16px' } });
    ex.append(h('div', { class: 'uplabel', style: { marginBottom: '8px' } }, 'Из книги'));
    ex.append(h('div', { style: { fontSize: '13px', lineHeight: 1.5, color: 'var(--ink)' } , html:
      `"my younger and more <b style='color:var(--accent)'>${tok.w}</b> years"` }));
    sheet.append(ex);

    // info strip — all-instances notice
    if (!wasAlreadyTranslated) {
      sheet.append(h('div', { style: { marginTop: '14px', padding: '10px 12px', borderRadius: '10px', background: 'color-mix(in oklab, var(--accent) 10%, transparent)', color: 'var(--accent)', fontSize: '12px', fontWeight: 500, display: 'flex', gap: '8px', alignItems: 'center' } , html:
        `${I.check.replace('<svg', '<svg width="14" height="14"')} Переведены все вхождения в тексте` }));
    }

    // actions
    const row = h('div', { style: { marginTop: '20px', display: 'flex', gap: '10px' } });
    // toggle saved
    const saveBtn = h('button', {
      class: 'btn ' + (saved ? 'ghost' : 'primary'),
      style: { flex: 1 },
      onclick: () => {
        if (saved) {
          S.saved = S.saved.filter(s => s.w !== tok.w);
          showToast('Убрано из словаря');
        } else {
          S.saved.unshift({ w: tok.w, ru: info.ru, ex: 'my younger and more ' + tok.w + ' years', src: 'The Great Gatsby', lvl: 'new', d: 0, ipa: info.ipa, pos: info.pos });
          showToast('В словарь ✓');
        }
        closeSheet();
      }
    });
    saveBtn.innerHTML = saved ? `${I.check.replace('<svg', '<svg width="16" height="16"')} В словаре` : `${I.plus.replace('<svg', '<svg width="16" height="16"')} В словарь`;
    row.append(saveBtn);

    // undo translation — only if word is translated
    if (S.translated.has(tok.w)) {
      const undoBtn = h('button', {
        class: 'btn ghost', style: { flex: 1 },
        onclick: () => {
          S.translated.delete(tok.w);
          closeSheet();
          renderReaderOnly();
          showToast('Вернули оригинал');
        }
      });
      undoBtn.innerHTML = `${I.undo.replace('<svg', '<svg width="16" height="16"')} Оригинал`;
      row.append(undoBtn);
    }
    sheet.append(row);

    openSheet(sheet);
  }

    // filter chips
    const filters = [
      { id: 'all',      lbl: 'Все',       n: S.saved.length },
      { id: 'review',   lbl: 'Повторить', n: counts.review },
      { id: 'learning', lbl: 'Учу',       n: S.saved.filter(d=>d.lvl==='learning').length },
      { id: 'new',      lbl: 'Новые',     n: S.saved.filter(d=>d.lvl==='new').length },
      { id: 'mastered', lbl: 'Выучено',   n: counts.mastered },
    ];
    const fRow = h('div', { style: { padding: '0 22px 12px', display: 'flex', gap: '8px', overflowX: 'auto', flexWrap: 'nowrap' } });
    filters.forEach(f => {
      const c = h('span', {
        class: 'chip' + (S.dictFilter === f.id ? ' on' : ''),
        onclick: () => { S.dictFilter = f.id; render(); }
      });
      c.innerHTML = `${f.lbl} <span class="n">${f.n}</span>`;
      fRow.append(c);
    });
    root.append(fRow);

    // list
    const filtered = S.dictFilter === 'all' ? S.saved : S.saved.filter(d => d.lvl === S.dictFilter);
    const list = h('div', { style: { padding: '0 22px 24px', display: 'flex', flexDirection: 'column', gap: '10px' } });

    if (filtered.length === 0) {
      list.append(h('div', { style: { padding: '40px 20px', textAlign: 'center', color: 'var(--ink-2)', fontSize: '13px' } }, 'Здесь пока пусто'));
    } else {
      filtered.forEach(d => {
        const b = badgeFor(d.lvl);
        const card = h('div', { class: 'card', style: { padding: '14px', cursor: 'pointer' }, onclick: () => openSavedWord(d) });
        card.innerHTML = `
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">
            <div style="flex:1;min-width:0">
              <div style="display:flex;gap:8px;align-items:baseline;flex-wrap:wrap">
                <div style="font-size:19px;font-weight:600;letter-spacing:-0.01em">${d.w}</div>
                <div style="font-size:13px;color:var(--ink-2)">— ${d.ru}</div>
              </div>
              <div style="margin-top:6px;font-size:12px;color:var(--ink-2);line-height:1.4">"${d.ex}"</div>
              <div style="margin-top:8px;font-size:10px;color:var(--ink-2);letter-spacing:0.02em">
                ${d.src}${d.d > 0 ? ' · ' + d.d + ' дн.' : ''}
              </div>
            </div>
            <span style="padding:4px 8px;border-radius:6px;font-size:10px;font-weight:600;background:${b.bg};color:${b.col};white-space:nowrap">${b.t}</span>
          </div>
        `;
        list.append(card);
      });
    }
    root.append(list);
    return root;
  }

  function badgeFor(lvl) {
    if (lvl === 'new') return { bg: 'var(--accent)', col: '#fff', t: 'новое' };
    if (lvl === 'learning') return { bg: 'var(--soft)', col: 'var(--ink)', t: 'учу' };
    if (lvl === 'review') return { bg: '#c9a253', col: '#2d1a12', t: 'повторить' };
    return { bg: S.dark ? '#2a3f24' : '#d8e0c0', col: S.dark ? '#c5d5a0' : '#2a3f14', t: 'выучено' };
  }

  function openSavedWord(d) {
    const sheet = h('div', {});
    const head = h('div', { style: { display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: '12px' } });
    head.append(h('div', {},
      h('div', { style: { fontSize: '34px', fontWeight: 600, lineHeight: 1, letterSpacing: '-0.02em' } }, d.w),
      h('div', { style: { marginTop: '6px', fontSize: '13px', color: 'var(--ink-2)', fontStyle: 'italic' } }, `${d.ipa} · ${d.pos}`)
    ));
    const closeBtn = h('button', {
      style: { width: '36px', height: '36px', borderRadius: '12px', border: '1px solid var(--line)', background: 'transparent', color: 'var(--ink)', cursor: 'pointer' },
      onclick: closeSheet, html: I.x.replace('<svg', '<svg width="16" height="16"')
    });
    head.append(closeBtn);
    sheet.append(head);

    sheet.append(h('div', { style: { marginTop: '16px', padding: '14px', borderRadius: '14px', background: 'var(--soft)' } },
      h('div', { class: 'uplabel', style: { marginBottom: '6px' } }, 'Перевод'),
      h('div', { style: { fontSize: '18px', fontWeight: 500 } }, d.ru)
    ));

    sheet.append(h('div', { style: { marginTop: '16px' } },
      h('div', { class: 'uplabel', style: { marginBottom: '8px' } }, `Из книги · ${d.src}`),
      h('div', { style: { fontSize: '13px', lineHeight: 1.5 }, html: `"${d.ex.replace(d.w, `<b style='color:var(--accent)'>${d.w}</b>`)}"` })
    ));

    const row = h('div', { style: { marginTop: '22px', display: 'flex', gap: '10px' } });
    const train = h('button', { class: 'btn primary', style: { flex: 1 }, onclick: () => { closeSheet(); S.tab = 'learn'; S.screen = 'learnCard'; S.learn = { idx: 0, correct: 0, done: false, feedback: null }; render(); } });
    train.innerHTML = `${I.brain.replace('<svg', '<svg width="16" height="16"')} Тренировать`;
    const del = h('button', { class: 'btn ghost', style: { flex: 1 }, onclick: () => { S.saved = S.saved.filter(s => s.w !== d.w); closeSheet(); render(); showToast('Удалено'); } });
    del.innerHTML = `${I.x.replace('<svg', '<svg width="16" height="16"')} Удалить`;
    row.append(train, del);
    sheet.append(row);

    openSheet(sheet);
  }

  // LEARN HOME
  function ScreenLearn() {
    const root = h('div', { class: 'scroll screen-in', style: { padding: '18px 22px 24px' } });
    root.append(h('div', { class: 'uplabel', style: { marginBottom: '2px' } }, 'Тренировка'));
    root.append(h('h1', { style: { margin: 0, fontSize: '30px', letterSpacing: '-0.02em', fontWeight: 600 } }, 'Что учим сегодня'));

    // daily goal
    const ready = S.saved.filter(d => d.lvl !== 'mastered').length;
    const goal = h('div', { class: 'card', style: { marginTop: '18px', padding: '18px', background: 'var(--soft)', border: 'none' } });
    goal.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:32px;height:32px;border-radius:10px;background:var(--accent);color:#fff;display:inline-flex;align-items:center;justify-content:center">${I.fire.replace('<svg', '<svg width="18" height="18"')}</div>
        <div>
          <div style="font-size:14px;font-weight:600">Цель дня: 10 слов</div>
          <div style="font-size:11px;color:var(--ink-2)">8 / 10 сделано</div>
        </div>
      </div>
      <div class="pbar"><i style="width:80%"></i></div>
    `;
    root.append(goal);

    // mode cards
    const modes = [
      { id: 'mc', title: 'Выбор перевода', desc: '4 варианта · быстро и бодро', n: ready, emoji: '⚡' },
      { id: 'fl', title: 'Карточки',       desc: 'Интервальные повторения',     n: ready, emoji: '🧠' },
    ];
    root.append(h('div', { class: 'uplabel', style: { marginTop: '22px', marginBottom: '10px' } }, 'Режимы'));

    modes.forEach((m, i) => {
      const card = h('div', { class: 'card', style: { padding: '16px', marginBottom: '10px', cursor: 'pointer', display: 'flex', gap: '14px', alignItems: 'center' } , onclick: () => { S.screen = 'learnCard'; S.learn = { idx: 0, correct: 0, done: false, feedback: null }; render(); } });
      card.innerHTML = `
        <div style="width:44px;height:44px;border-radius:12px;background:var(--soft);display:inline-flex;align-items:center;justify-content:center;font-size:22px">${m.emoji}</div>
        <div style="flex:1">
          <div style="font-size:15px;font-weight:600">${m.title}</div>
          <div style="font-size:12px;color:var(--ink-2);margin-top:2px">${m.desc}</div>
        </div>
        <div style="font-size:12px;color:var(--ink-2);display:inline-flex;align-items:center;gap:6px">
          ${m.n} слов ${I.chevR.replace('<svg', '<svg width="14" height="14"')}
        </div>
      `;
      root.append(card);
    });

    return root;
  }

  // LEARN CARD (multiple choice)
  function ScreenLearnCard() {
    const root = h('div', { class: 'scroll screen-in', style: { padding: '14px 22px 24px' } });

    const pool = S.saved.filter(d => d.lvl !== 'mastered');
    const total = Math.min(pool.length, 10);

    if (S.learn.done || S.learn.idx >= total || total === 0) {
      // done screen
      root.append(h('div', { style: { textAlign: 'center', padding: '40px 20px' } },
        h('div', { style: { fontSize: '56px', marginBottom: '14px' } }, '✨'),
        h('h1', { style: { margin: 0, fontSize: '28px', fontWeight: 600 } }, 'Готово!'),
        h('div', { style: { marginTop: '10px', fontSize: '14px', color: 'var(--ink-2)' } }, `${S.learn.correct} из ${total} верно`),
        h('div', { class: 'card', style: { marginTop: '26px', padding: '16px', textAlign: 'left', background: 'var(--soft)', border: 'none' }, html: `
          <div style="font-size:12px;color:var(--ink-2);margin-bottom:4px">Серия</div>
          <div style="font-size:20px;font-weight:600">7 дней подряд 🔥</div>
          <div style="font-size:11px;color:var(--ink-2);margin-top:4px">+${S.learn.correct * 10} XP</div>
        `}),
      ));
      const done = h('button', { class: 'btn primary full', style: { marginTop: '20px' }, onclick: () => { S.screen = 'learn'; render(); } }, 'Вернуться');
      root.append(done);
      return root;
    }

    const cur = pool[S.learn.idx];
    // generate 3 distractors
    const distractors = S.saved.filter(d => d.w !== cur.w).map(d => d.ru);
    const fallback = ['внушительный','странный','тёплый','острый','лёгкий','прилежный','хрупкий'];
    const picks = [cur.ru, ...[...distractors, ...fallback].slice(0, 3)];
    // deterministic shuffle (based on idx)
    const ordered = picks.slice().sort((a, b) => (a.length - b.length) + (S.learn.idx - S.learn.idx * 0.5));

    // header + progress
    root.append(h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '6px' } },
      h('button', { class: 'btn ghost sm', style: { padding: '6px 10px' }, onclick: () => { S.screen = 'learn'; render(); }, html: I.chevL.replace('<svg', '<svg width="18" height="18"') }),
      h('div', { style: { fontSize: '12px', color: 'var(--ink-2)' } }, `${S.learn.idx + 1} / ${total}`),
      h('div', { style: { width: '34px' } })
    ));
    const prog = h('div', { style: { display: 'flex', gap: '4px', marginBottom: '20px' } });
    for (let i = 0; i < total; i++) {
      prog.append(h('div', { style: { flex: 1, height: '3px', borderRadius: '2px', background: i < S.learn.idx ? 'var(--accent)' : i === S.learn.idx ? 'var(--ink)' : 'var(--line)' } }));
    }
    root.append(prog);

    // flashcard
    const card = h('div', { class: 'card', style: { padding: '30px 20px 24px', borderRadius: '20px', minHeight: '260px' } });
    card.append(h('div', { class: 'uplabel', style: { textAlign: 'center' } }, 'Какой перевод?'));
    card.append(h('div', { style: { marginTop: '16px', textAlign: 'center', fontSize: '42px', lineHeight: 1, letterSpacing: '-0.02em', fontWeight: 600 } }, cur.w));
    card.append(h('div', { style: { marginTop: '10px', textAlign: 'center', fontSize: '12px', color: 'var(--ink-2)', fontStyle: 'italic' } }, `${cur.ipa} · ${cur.pos}`));
    card.append(h('div', { style: { marginTop: '22px', padding: '14px 16px', borderRadius: '12px', background: 'var(--soft)', fontSize: '14px', lineHeight: 1.55, textAlign: 'center' } , html:
      `"${cur.ex.replace(cur.w, `<b style='color:var(--accent)'>${cur.w}</b>`)}"` }));
    card.append(h('div', { style: { marginTop: '8px', textAlign: 'center', fontSize: '10px', color: 'var(--ink-2)', letterSpacing: '0.04em' } }, cur.src));
    root.append(card);

    // answers
    const grid = h('div', { style: { marginTop: '18px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' } });
    ordered.forEach((opt) => {
      const right = opt === cur.ru;
      let style = 'background:var(--card);color:var(--ink);border:1.5px solid var(--line);';
      if (S.learn.feedback) {
        if (right) style = 'background:color-mix(in oklab, #6b8a4a 25%, var(--card));color:var(--ink);border:1.5px solid #6b8a4a;';
        else if (S.learn.feedback === 'wrong' && opt === S.learn.pickedWrong) style = 'background:color-mix(in oklab, var(--accent) 18%, var(--card));color:var(--ink);border:1.5px solid var(--accent);';
      }
      const btn = h('button', {
        style: { ...styleFromStr(style), padding: '16px 14px', borderRadius: '14px', fontSize: '15px', fontWeight: 500, fontFamily: 'inherit', textAlign: 'left', cursor: S.learn.feedback ? 'default' : 'pointer', transition: 'background 0.2s, border 0.2s' },
        onclick: () => {
          if (S.learn.feedback) return;
          if (right) {
            S.learn.feedback = 'ok';
            S.learn.correct += 1;
            renderLearnOnly();
            setTimeout(() => { S.learn.idx += 1; S.learn.feedback = null; S.learn.pickedWrong = null; if (S.learn.idx >= total) S.learn.done = true; render(); }, 700);
          } else {
            S.learn.feedback = 'wrong';
            S.learn.pickedWrong = opt;
            renderLearnOnly();
            setTimeout(() => { S.learn.idx += 1; S.learn.feedback = null; S.learn.pickedWrong = null; if (S.learn.idx >= total) S.learn.done = true; render(); }, 1200);
          }
        }
      }, opt);
      grid.append(btn);
    });
    root.append(grid);

    // footer actions
    root.append(h('div', { style: { marginTop: '18px', display: 'flex', justifyContent: 'space-between', fontSize: '12px', color: 'var(--ink-2)' } },
      h('span', { style: { cursor: 'pointer' }, onclick: () => { S.learn.idx += 1; if (S.learn.idx >= total) S.learn.done = true; render(); } }, 'Пропустить'),
      h('span', {}, S.learn.feedback === 'ok' ? '✓ верно' : S.learn.feedback === 'wrong' ? 'правильный вариант подсвечен' : 'нажми любой вариант')
    ));

    return root;
  }

  function styleFromStr(str) {
    const obj = {};
    str.split(';').forEach(s => { const [k,v] = s.split(':'); if (k && v) obj[k.trim().replace(/-([a-z])/g, (_,c)=>c.toUpperCase())] = v.trim(); });
    return obj;
  }

  // ─────────── Render ───────────
  function render() {
    const root = $('root');
    root.innerHTML = '';
    closeSheet();

    let screen;
    switch (S.screen) {
      case 'reader':    screen = ScreenReader(); break;
      case 'cat':       screen = ScreenCatalog(); break;
      case 'dict':      screen = ScreenDictionary(); break;
      case 'learn':     screen = ScreenLearn(); break;
      case 'learnCard': screen = ScreenLearnCard(); break;
      case 'lib':
      default:          screen = ScreenLibrary(); break;
    }
    root.append(screen);

    // tab bar visibility — hide in reader
    const slot = $('tabbarSlot');
    slot.innerHTML = '';
    if (S.screen !== 'reader') slot.append(TabBar());
  }

  // in-place re-render helpers that don't blow the whole screen away
  function renderReaderOnly() {
    if (S.screen !== 'reader') return;
    const root = $('root');
    root.innerHTML = '';
    root.append(ScreenReader());
  }
  function renderLearnOnly() {
    if (S.screen !== 'learnCard') return;
    const root = $('root');
    root.innerHTML = '';
    root.append(ScreenLearnCard());
  }

  // ─────────── Theme toggle ───────────
  function applyTheme() {
    document.body.classList.toggle('dark', S.dark);
    document.getElementById('phone').classList.toggle('dark', S.dark);
    const t = $('themeToggle');
    t.querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.mode === (S.dark ? 'dark' : 'light')));
  }
  $('themeToggle').addEventListener('click', (e) => {
    const b = e.target.closest('button'); if (!b) return;
    S.dark = b.dataset.mode === 'dark';
    applyTheme();
  });

  applyTheme();
  render();
  </script>
</body>
</html>
