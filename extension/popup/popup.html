<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>en-reader</title>
  <style>
    body {
      font: 13px/1.4 system-ui, -apple-system, sans-serif;
      width: 280px;
      margin: 0;
      padding: 12px 14px;
      color: #222;
    }
    h1 {
      font-size: 13px;
      margin: 0 0 8px;
      color: #234;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    button {
      width: 100%;
      padding: 8px 10px;
      background: #2f6fd8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font: inherit;
      cursor: pointer;
      margin-top: 6px;
    }
    button.secondary {
      background: transparent;
      color: #2f6fd8;
      border: 1px solid #2f6fd8;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    .status {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
    }
    .status.ok { background: #e4f5e9; color: #1d5a2c; }
    .status.err { background: #fdecec; color: #8a2020; }
    .status.info { background: #eef3fb; color: #234; }
    .who { font-size: 12px; color: #555; margin: 2px 0 10px; }
  </style>
</head>
<body>
  <h1>en-reader</h1>
  <div class="who" id="who">…</div>
  <button id="activate">Читать эту страницу</button>
  <button id="options" class="secondary">Настройки / вход</button>
  <div id="status" class="status info" hidden></div>

  <script type="module" src="popup.js"></script>
</body>
</html>
